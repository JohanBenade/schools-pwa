<!--
  allocation_result.html
  Replaces the interstitial once process_absence completes.
  Shows REAL counts + REAL elapsed time (no hardcoding).
  Expects:
    flow         (str)  - "teacher" or "principal" (both tap to continue; label differs)
    success      (bool) - green check vs warning
    covered_count(int), total_count (int)
    absence_status (str)
    elapsed_secs (float/str) - computed in route from completed_at - started_at
    sick_teacher (dict: name, venue)
    advance_url  (str)  - destination
    advance_label(str)  - button text for principal flow (e.g. "View Coverage")
-->
<div class="card" id="resultCard" style="text-align: center; padding: 32px 24px;">

    {% if success %}
        <div class="result-icon ok" aria-hidden="true">&#10003;</div>
        <h2 style="font-size: 22px; color: {% if flow == 'teacher' %}#166534{% else %}#4ade80{% endif %}; margin: 16px 0 4px;">Cover sorted</h2>
    {% else %}
        <div class="result-icon warn" aria-hidden="true">!</div>
        <h2 style="font-size: 22px; color: #92400e; margin: 16px 0 4px;">Partly covered</h2>
    {% endif %}

    <p style="color: {% if flow == 'teacher' %}#1e293b{% else %}#f1f5f9{% endif %}; font-size: 17px; font-weight: 600; margin-bottom: 4px;">
        {{ covered_count }} of {{ total_count }} periods covered
    </p>
    <p style="color: {% if flow == 'teacher' %}#64748b{% else %}#cbd5e1{% endif %}; font-size: 13px; margin-bottom: 24px;">
        Done in {{ elapsed_secs }}s &middot; {{ absence_status }}
    </p>

    <a href="{{ advance_url }}" class="submit-btn green"
       style="display: block; text-decoration: none; box-sizing: border-box;">
        {% if flow == "teacher" %}Continue to My Day{% else %}{{ advance_label or "View Coverage" }}{% endif %} &rarr;
    </a>
</div>

<script>
    (function () {
        document.querySelectorAll('.back-link').forEach(function (el) {
            el.style.display = 'none';
        });
    })();
</script>

<style>
    .result-icon {
        width: 64px;
        height: 64px;
        line-height: 64px;
        margin: 0 auto;
        border-radius: 50%;
        font-size: 34px;
        font-weight: 700;
    }
    .result-icon.ok   { background: #f0fdf4; color: #22c55e; border: 3px solid #22c55e; }
    .result-icon.warn { background: #fffbeb; color: #f59e0b; border: 3px solid #f59e0b; }
</style>
