<!--
  finding_interstitial.html
  Shown INSTANTLY after absence form submit. Genuine during-work spinner.
  Auto-fires the processing route via hx-trigger="load".
  Expects: process_url (str) - the URL of the route that runs process_absence.
  Light theme, matches report.html / mark_absent.html card style.
-->
<div class="card" id="findingCard" style="text-align: center; padding: 32px 24px;"
     hx-get="{{ process_url }}"
     hx-trigger="load"
     hx-target="#findingCard"
     hx-swap="outerHTML">

    <div class="spinner" aria-hidden="true"></div>

    <h2 style="font-size: 20px; color: #1e293b; margin: 20px 0 6px;">Finding cover&hellip;</h2>
    <p style="color: #64748b; font-size: 14px; margin-bottom: 20px;">Hang tight, this takes a moment.</p>

    <ul class="tick-list">
        <li class="tick tick-1">Checking the timetable</li>
        <li class="tick tick-2">Finding available teachers</li>
        <li class="tick tick-3">Assigning cover</li>
    </ul>
</div>

<style>
    .spinner {
        width: 48px;
        height: 48px;
        margin: 0 auto;
        border: 5px solid #fee2e2;
        border-top-color: #ef4444;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .tick-list {
        list-style: none;
        text-align: left;
        max-width: 260px;
        margin: 0 auto;
        padding: 0;
    }
    .tick {
        font-size: 15px;
        color: #cbd5e1;
        padding: 8px 0 8px 30px;
        position: relative;
        opacity: 0;
        animation: tickIn 0.4s ease forwards;
    }
    .tick::before {
        content: "\2713";
        position: absolute;
        left: 0;
        top: 8px;
        color: #22c55e;
        font-weight: 700;
    }
    .tick-1 { animation-delay: 0.1s; }
    .tick-2 { animation-delay: 0.9s; }
    .tick-3 { animation-delay: 1.7s; }
    @keyframes tickIn {
        from { opacity: 0; transform: translateX(-6px); }
        to   { opacity: 1; transform: translateX(0); color: #166534; }
    }
</style>
